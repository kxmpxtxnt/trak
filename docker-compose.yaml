services:
  postgres:
    image: postgres:latest
    container_name: trak-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - ./data:/var/lib/postgresql/data/pgdata
    environment:
      POSTGRES_USER: trak
      POSTGRES_PASSWORD: trak
      PGDATA: /var/lib/postgresql/data/pgdata
    shm_size: 512mb